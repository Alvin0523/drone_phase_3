[workspace]
name = "catkin_ws"
channels = ["https://prefix.dev/robostack-noetic", "https://prefix.dev/conda-forge"]
platforms = ["linux-64"]

[dependencies]
# Base ROS dependencies
ros-noetic-ros-base = "*"
pkg-config = "*"
compilers = "*"
make = "*"
ninja = "*"

# Build tools
colcon-common-extensions = "*"
cmake = "<4"

# Workspace dependencies
ros-noetic-catkin = "*"
ros-noetic-message-filters = "*"
ros-noetic-message-generation = "*"
ros-noetic-message-runtime = "*"
ros-noetic-nav-msgs = "*"
ros-noetic-roscpp = "*"
ros-noetic-rospy = "*"
ros-noetic-sensor-msgs = "*"
ros-noetic-std-msgs = "*"
ros-noetic-visualization-msgs = "*"

[tasks]
build = {cmd = "catkin_make", description = "Build the ROS workspace"}
clean = {cmd = "rm -rf build devel", description = "Clean build artifacts (build, devel directories)"}

# Scripts to source on environment activation.

[activation]
scripts = ["devel/setup.bash"]
